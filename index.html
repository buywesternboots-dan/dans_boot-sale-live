  .slip th,.slip td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line);} .slip td.r,.slip th.r{text-align:right;}
  .policybox{background:var(--sand-2);border:1.5px dashed var(--brass);border-radius:6px;padding:12px 14px;margin-top:14px;font-family:"Space Mono";font-size:12px;line-height:1.7;}
  .adm{width:100%;border-collapse:collapse;font-family:"Space Mono";font-size:12px;margin:12px 0;}
  .adm th,.adm td{text-align:left;padding:7px 7px;border-bottom:1px solid var(--line);vertical-align:middle;} .adm img{width:38px;height:38px;object-fit:cover;border-radius:2px;}
  .ordbox{background:var(--sand-2);border:1px solid var(--line);border-left:3px solid var(--saddle);border-radius:4px;padding:14px 16px;margin:12px 0;}
  .banner{background:#e6dcc4;border:1.5px dashed var(--brass);border-radius:4px;padding:9px 14px;font-family:"Space Mono";font-size:11.5px;color:var(--ink-soft);margin:14px 0;}

  .fixgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;align-items:end;}

  .fixgrid label.need span{color:var(--need);} .fixgrid label.need input{border-color:var(--need);background:#fbf1ee;}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;} .chip{font-family:"Space Mono";font-size:11px;border:1px solid var(--turq);color:var(--turq);background:transparent;border-radius:20px;padding:3px 10px;cursor:pointer;} .chip:hover{background:var(--turq);color:#fff;}
  .admsearch{width:100%;max-width:440px;margin:4px 0 8px;padding:9px 12px;border:1px solid var(--line);background:#fff;border-radius:4px;font-size:14px;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}

<script>
const SB_URL='https://ckwvaykmsbpckepczcsd.supabase.co';
const SB_KEY='sb_publishable__FERRSso9CAnparqSlk3gg_MSfIM352';
const sb = window.supabase.createClient(SB_URL, SB_KEY);
let products = [];
let isAdmin = false;
let dbOrders = [];
let cart=[], orders=[], insVal=null, insTouched=false, adminTab='drafts', adminQuery='', editingId=null;
let filt={ gender:'M', sizes:new Set(), brand:'' };
const PHONE='404-488-0174', PHONE_INTL='+14044880174';

const esc=s=>String(s ?? '').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const V=()=>document.getElementById('view');
const lot=id=>'LOT '+String(id).padStart(3,'0');
function badge(){document.getElementById('cartCount').textContent=cart.length;}
const BOOT=`<svg class="boot" viewBox="0 0 180 180" fill="none" stroke="currentColor" stroke-width="3.4"><path d="M112 28 Q130 18 148 28 L148 116 L160 150 Q164 161 153 163 L131 163 L126 140 Q116 150 78 152 L34 152 Q22 152 24 143 L30 130 Q44 118 78 116 L108 110 L112 32 Z" fill="currentColor" fill-opacity=".10"/></svg>`;
const shot=p=>{const u=p&&p.photos&&p.photos[0];return `<div class="shot">${u?`<img src="${esc(u)}" alt="${esc(p.brand||'')} ${esc(p.material||'')} western boots" loading="lazy">`:BOOT}</div>`;};
const WID=/(AAAA|AAA|AA|BB|A|B|C|DD|D|EEEE|EEE|EE|E|[2-6]E|M|N|W)/i;
const WLADDER=['AAAA','AAA','AA','A','B','C','D','E','EE','EEE','EEEE'];
function menToWomenWidth(w){ w=(w||'').toUpperCase(); const map={M:'B',N:'A',W:'D'}; if(map[w])return map[w]; const i=WLADDER.indexOf(w); return i<0?'':WLADDER[Math.max(0,i-2)]; }
function womensFromMens(size,width){ return {ws:(size!=null)?+(Number(size)+1.5).toFixed(1):null, ww:menToWomenWidth(width)}; }
function parseSizeJS(s){const m=String(s||'').trim().match(new RegExp('^(\\d+(?:\\.\\d+)?)\\s*'+WID.source+'?$','i'));return m?{size:parseFloat(m[1]),width:(m[2]||'').toUpperCase()}:{size:null,width:''};}

function setMeta(title,desc,product){
  document.title=title;
  const m=document.querySelector('meta[name=description]'); if(m&&desc) m.setAttribute('content',desc);
  const ld=document.getElementById('ld-product');
  ld.textContent=product?JSON.stringify({"@context":"https://schema.org","@type":"Product",
    name:`${product.brand} ${product.material||''}`.trim(),image:product.photos||[],material:product.material||undefined,
    brand:{"@type":"Brand",name:product.brand},description:(product.notes||'').slice(0,300),
    offers:{"@type":"Offer",price:product.price,priceCurrency:"USD",
      availability:product.status==='sold'?"https://schema.org/SoldOut":"https://schema.org/InStock",
      itemCondition:"https://schema.org/UsedCondition"}}):'';
}

const RANGE={ M:{lo:7,hi:15}, W:{lo:5,hi:12} };
function sizeButtons(dept){const b=RANGE[dept];const out=[bt('lo',dept==='M'?'7 & under':'5 & under')];
  for(let s=b.lo+0.5;s<b.hi;s+=0.5) out.push(bt(s,String(s)));
  out.push(bt('hi',dept==='M'?'15 & over':'12 & over'));return out.join('');
  function bt(tok,label){return `<button class="size ${filt.sizes.has(tok)?'active':''}" onclick="toggleSize('${tok}')">${label}</button>`;}}
function matchSize(sz,dept){if(!filt.sizes.size)return true;const b=RANGE[dept];
  for(const t of filt.sizes){if(t==='lo'&&sz<=b.lo)return true;if(t==='hi'&&sz>=b.hi)return true;if(t!=='lo'&&t!=='hi'&&sz===Number(t))return true;}return false;}

function search(){
  const dept=filt.gender, brand=filt.brand.trim().toLowerCase(), out=[];
  for(const p of products){
    if(p.status!=='published') continue;
    if(brand && !((p.brand+' '+(p.title||'')+' '+(p.material||'')).toLowerCase().includes(brand))) continue;
    if(dept==='M'){ if(p.gender!=='M')continue; if(!matchSize(p.size,'M'))continue; out.push({...p,dsize:p.size,dwidth:p.width,cross:false}); }
    else{ let comp,cross,dw;
      if(p.gender==='W'){comp=p.size;cross=false;dw=p.width;}
      else if(p.gender==='M'&&p.women_size!=null){comp=p.women_size;cross=true;dw=p.women_width||p.width;}
      else continue;
      if(!matchSize(comp,'W'))continue; out.push({...p,dsize:comp,dwidth:dw,cross}); }
  }
  return out.sort((a,b)=>a.brand.localeCompare(b.brand)||(a.dsize||0)-(b.dsize||0));
}
function priceCart(items){const sub=items.reduce((s,p)=>s+p.price,0);
  if(!insTouched) insVal=sub>=300?10:5;
  return {subtotal:+sub.toFixed(2), insurance:+(insVal||0), total:+(sub+(+insVal||0)).toFixed(2)};}

function go(v,a){({catalog:catalogView,product:productView,cart:cartView,receipt:receiptView,admin:adminView,contact:contactView}[v])(a);window.scrollTo(0,0);}

const POLICIES=`<section class="policies" aria-label="Shop policies">
  <div class="policy"><svg viewBox="0 0 24 24"><path d="M3 7h11v8H3zM14 10h4l3 3v2h-7z"/><circle cx="7" cy="17" r="1.6"/><circle cx="17" cy="17" r="1.6"/></svg><div class="t">Free USA Shipping</div><div class="s">On every order</div></div>
  <div class="policy"><svg viewBox="0 0 24 24"><path d="M3 8a9 9 0 0 1 15-3l3 3M21 6v5h-5"/></svg><div class="t">Free USA Returns</div><div class="s">3 days, unworn</div></div>
  <div class="policy"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18"/></svg><div class="t">Worldwide Shipping</div><div class="s">Text Dan for a quote</div></div>
  <div class="policy"><svg viewBox="0 0 24 24"><path d="M4 7h16v10H4z"/><path d="M8 11h8M8 14h5"/></svg><div class="t">Prices Firm</div><div class="s">No offers, no haggling</div></div>
</section>`;

function catalogView(){
  setMeta("Dan's Boot Sale — Vintage & Exotic Western Boots","Vintage and exotic western boots, inspected and specced by hand. Free USA shipping and returns.",null);
  const items=search();
  V().innerHTML=`
    <div class="searchtop"><input type="search" id="topsearch" placeholder="Search boots — brand, leather, keyword…" value="${esc(filt.brand)}" oninput="setBrand(this.value)"></div>
    <h1 class="tag">Vintage &amp; exotic western boots · one pair each</h1>
    ${POLICIES}
    <div class="controls">
      <div class="ctl-label">Department</div>
      <div class="group">
        <button class="seg ${filt.gender==='M'?'active':''}" onclick="setGender('M')">Men's</button>
        <button class="seg ${filt.gender==='W'?'active':''}" onclick="setGender('W')">Women's</button>
      </div>
      <div class="ctl-label" style="margin-top:16px">Size · ${filt.gender==='M'?"Men's":"Women's"}</div>
      <div class="group sizes">${sizeButtons(filt.gender)}</div>
      <div class="row"><button class="link" onclick="clearSizes()">Reset sizes</button><span class="muted">${items.length} pair${items.length===1?'':'s'} in stock</span></div>
      <div class="grid">${items.length?items.map(p=>`
        <div class="card" onclick="go('product',${p.id})">${shot(p)}
          ${p.cross?`<span class="badge cross">Also fits Wmn ${p.women_size}</span>`:`<span class="badge">1 pair</span>`}
          <div class="cardbody"><div class="brand">${esc(p.brand)}</div>
            <div class="leather">${esc(p.material||'')}</div>
            <div class="stamp">${p.cross?"WMN":(p.gender==='M'?"MEN":"WMN")} · US ${p.dsize ?? '?'}${p.dwidth?' '+esc(p.dwidth):''}</div>
            <div class="pricetag">$${p.price.toFixed(0)}<span>firm</span></div></div>
        </div>`).join(''):'<p class="muted">No pairs match. Try the other department or clear the search.</p>'}</div>

async function publishDraft(id){
  const p=products.find(x=>x.id===id);const g=k=>(document.getElementById('d_'+id+'_'+k)||{}).value?.trim()||'';
  const {size,width}=parseSizeJS(g('size'));
  const brand=g('brand'); const sz=size??p.size; const wd=(g('width')||width||'').toUpperCase();
  const material=g('leather'); const prc=parseFloat(g('price')); const price=prc>0?prc:p.price;
  const photos=g('photos').split(/\n+/).map(x=>x.trim()).filter(Boolean).slice(0,30);
  const miss=[]; if(!photos.length)miss.push('photos'); if(!price||price<=0)miss.push('price');
  if(!brand||brand.toLowerCase()==='unknown')miss.push('brand'); if(!sz)miss.push('size'); if(!wd)miss.push('width');
  if(miss.length){alert('Still missing: '+miss.join(', '));return;}
  const {error}=await sb.from('products').update({brand,size:sz,width:wd,material,price,photos,status:'published',missing:[]}).eq('id',id);
  if(error){alert(error.message);return;} await loadProducts(); adminView();
}

async function saveItem(){
  const g=id=>(document.getElementById(id)||{}).value?.trim()||'';
  const {size,width}=parseSizeJS(g('a_size'));
  const photos=g('a_photos').split(/\n+/).map(x=>x.trim()).filter(Boolean).slice(0,30);
  const wsz=parseFloat(g('a_wsize'));
  const rec={gender:g('a_gender')||'M',brand:g('a_brand'),size:size,width:(g('a_width')||width||'').toUpperCase(),
    material:g('a_leather'),price:parseFloat(g('a_price'))||null,title:g('a_title'),notes:g('a_notes'),photos,suggest:[]};
  const isM=g('a_gender')==='M';
  const autoW=(isM&&size!=null)?womensFromMens(size,rec.width):{ws:null,ww:null};
  rec.women_size=isM?(wsz>0?wsz:autoW.ws):null;
  rec.women_width=isM?autoW.ww:null;
  const miss=[]; if(!photos.length)miss.push('photos'); if(!rec.price||rec.price<=0)miss.push('price');
  if(!rec.brand)miss.push('brand'); if(!rec.size)miss.push('size'); if(!rec.width)miss.push('width');
  rec.missing=miss; rec.status=miss.length?'draft':'published';
  let error;
  if(editingId){({error}=await sb.from('products').update(rec).eq('id',editingId));editingId=null;}
  else {({error}=await sb.from('products').insert(rec));}
  if(error){alert(error.message);return;}
  adminTab=rec.status==='published'?'published':'drafts';
  await loadProducts(); alert(rec.status==='published'?'Saved & published.':'Saved as draft (missing: '+miss.join(', ')+').'); adminView();
}
/* in-browser ListPerfectly CSV import */
let csvStaged=[];
function csvBody(){
  return `<p class="muted">Upload a ListPerfectly CSV. Complete rows publish; rows missing a required field go to the draft queue. Group Price is read from the notes; width is read from the title.</p>
    <input type="file" id="csvfile" accept=".csv" onchange="csvPreview()" style="margin:8px 0">
    <div id="csvout"></div>`;
}
function csvParse(text){
  const rows=[];let row=[],f='',i=0,q=false;text=text.replace(/^\uFEFF/,'');
  while(i<text.length){const c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){f+='"';i++;}else q=false;}else f+=c;}
    else if(c==='"')q=true; else if(c===','){row.push(f);f='';}
    else if(c==='\n'){row.push(f);rows.push(row);row=[];f='';}
    else if(c==='\r'){} else f+=c; i++;}
  if(f.length||row.length){row.push(f);rows.push(row);}
  const h=rows[0].map(x=>x.trim());
  return rows.slice(1).filter(r=>r.some(c=>c.trim())).map(r=>Object.fromEntries(h.map((k,j)=>[k,(r[j]||'').trim()])));
}
function extract(r){
  const notes=r['Notes']||'', title=r['Title']||'', desc=r['Description']||'';
  const gpm=notes.match(/group\s*price[:\s]*\$?\s*([\d,]+(?:\.\d+)?)/i);
  const price=gpm&&gpm[1]?parseFloat(gpm[1].replace(/,/g,'')):null;
  let size=null,width='';
  const sc=(r['Size']||'').match(new RegExp('^(\\d+(?:\\.\\d+)?)\\s*'+WID.source+'?$','i'));
  if(sc){size=parseFloat(sc[1]);width=(sc[2]||'').toUpperCase();}
  if(!width&&size!=null){const m=(title+' '+desc).match(new RegExp('\\b'+size+'\\s*'+WID.source+'\\b','i'));if(m)width=m[1].toUpperCase();}
  if(size==null){const m=(title+' '+desc).match(new RegExp('\\b(\\d{1,2}(?:\\.\\d)?)\\s*'+WID.source+'\\b','i'));if(m){size=parseFloat(m[1]);width=m[2].toUpperCase();}}
  const t=(title+' '+desc).toLowerCase();
  const men=/\bmen'?s?\b|\bmens\b/.test(t), wom=/\bwomen'?s?\b|\bwomens\b|cowgirl|ladies/.test(t);
  const gender=(wom&&!men)?'W':'M';
  const photos=((r['Main Image']||'')+' '+(r['Image Gallery']||'')).match(/https?:\/\/[^\s,;|"]+/g)||[];
  const brand=(r['Brand']||'').trim();
  const miss=[];if(!photos.length)miss.push('photos');if(!price||price<=0)miss.push('price');
  if(!brand||brand.toLowerCase()==='unknown')miss.push('brand');if(size==null)miss.push('size');if(!width)miss.push('width');
  const wc=(gender==='M'&&size!=null)?womensFromMens(size,width):{ws:null,ww:null};
  return {gender,brand,title,size,width,material:(r['Material']||'').trim(),price,notes:desc,
    photos:[...new Set(photos)].slice(0,30),women_size:wc.ws,women_width:wc.ww,suggest:[],missing:miss,status:miss.length?'draft':'published'};
}
function csvPreview(){
  const file=document.getElementById('csvfile').files[0];if(!file)return;
  const rd=new FileReader();
  rd.onload=e=>{const rows=csvParse(e.target.result);csvStaged=rows.map(extract);
    const pub=csvStaged.filter(x=>x.status==='published').length;
    document.getElementById('csvout').innerHTML=`<div class="banner">${csvStaged.length} rows read — ${pub} ready to publish, ${csvStaged.length-pub} will go to drafts.</div>
      <button class="btn" onclick="csvImport()">Import ${csvStaged.length} boots</button>`;};
  rd.readAsText(file);
}
async function csvImport(){
  const rows=csvStaged.map(r=>({gender:r.gender,brand:r.brand,title:r.title,size:r.size,width:r.width,material:r.material,price:r.price,notes:r.notes,photos:r.photos,women_size:r.women_size,women_width:r.women_width,status:r.status,missing:r.missing,suggest:r.suggest}));
  const {error}=await sb.from('products').insert(rows);
  if(error){alert('Import failed: '+error.message);return;}
  const n=rows.length;csvStaged=[];adminTab='published';await loadProducts();alert('Imported '+n+' boots.');adminView();
}
