  .topbar{position:absolute;top:0;left:0;right:0;display:flex;justify-content:flex-end;align-items:center;gap:8px;padding:12px 16px;background:linear-gradient(to bottom,rgba(20,14,8,.72),rgba(20,14,8,0));flex-wrap:wrap;}
  .navbtn{display:inline-flex;align-items:center;gap:6px;cursor:pointer;color:#f3e9d6;font-family:"Inter",system-ui,sans-serif;font-size:12px;letter-spacing:.05em;text-transform:uppercase;text-decoration:none;background:rgba(30,22,14,.55);border:1px solid rgba(199,154,82,.55);border-radius:6px;padding:7px 12px;}
  .navbtn:hover{background:rgba(30,22,14,.85);border-color:var(--brass);color:#fff;}
  .navbtn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.7;}
  .horseshoe-link{display:block;width:64px;margin:48px auto 10px;opacity:.8;cursor:pointer;border:none;background:none;padding:0;transition:opacity .2s,transform .25s;}
  .horseshoe-link img{width:100%;height:auto;display:block;}
  .horseshoe-link:hover{opacity:1;transform:rotate(-8deg);}
  .corral-wrap{max-width:320px;margin:60px auto;text-align:center;}
  .corral-title{font-family:'Playfair Display',serif;font-size:32px;margin-bottom:4px;}
  .corral-input{width:100%;font-family:'Work Sans',sans-serif;font-size:15px;padding:10px 12px;border:1px solid var(--saddle);background:#fff;border-radius:4px;color:var(--ink);margin-top:18px;text-align:center;}
  .corral-err{color:var(--need);font-size:13px;margin-top:10px;min-height:16px;}
  h1.tag{font-size:15px;font-family:"Inter",system-ui,sans-serif;font-weight:700;letter-spacing:.02em;color:var(--ink);margin:22px 0 2px;}
  /* search at top */
  .searchtop{margin:14px 0 6px;}
  .searchtop input{width:100%;font-family:"Work Sans";font-size:16px;padding:14px 16px;border:2px solid var(--saddle);background:#fff;border-radius:8px;color:var(--ink);}
  .searchtop input::placeholder{color:#9a8c70;}
  /* policy cards */
  .policies{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0 20px;}
  .policy{background:var(--night);color:var(--sand);border:1px solid var(--brass);border-radius:8px;padding:14px 12px;text-align:center;}
  .policy svg{width:22px;height:22px;stroke:var(--brass);fill:none;stroke-width:1.6;margin-bottom:6px;}
  .policy .t{font-family:"Inter",system-ui,sans-serif;font-weight:700;font-size:12px;letter-spacing:.05em;text-transform:uppercase;}
  .policy .s{font-size:11px;color:#ccbfa8;margin-top:3px;line-height:1.35;}
  @media (max-width:640px){.policies{grid-template-columns:repeat(2,1fr);}}
  .controls{padding:8px 0 6px;}
  .ctl-label{font-family:"Inter",sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink);margin-bottom:9px;}
  .seg,.size{font-family:"Inter",sans-serif;font-size:14px;font-weight:600;border:1.5px solid var(--line);background:transparent;color:var(--ink);border-radius:4px;padding:9px 16px;cursor:pointer;}
  .size{padding:7px 9px;} .seg:hover,.size:hover{border-color:var(--saddle);}
  .seg.active,.size.active{background:var(--ink);color:var(--sand);border-color:var(--ink);}
  .group{display:flex;gap:7px;flex-wrap:wrap;} .sizes{margin:4px 0 2px;}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin:14px 0;}
  .link{background:none;border:0;color:var(--turq);cursor:pointer;font-family:"Inter",system-ui,sans-serif;font-size:12px;text-decoration:underline;text-underline-offset:3px;padding:0;}
  .muted{color:var(--ink-soft);font-family:"Inter",system-ui,sans-serif;font-size:12px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:20px;margin:18px 0 44px;}
  @media (max-width:640px){.grid{grid-template-columns:repeat(2,1fr);gap:12px;}}
  .card{background:var(--sand-2);border:1px solid var(--line);border-radius:3px;cursor:pointer;overflow:hidden;position:relative;transition:transform .15s ease,box-shadow .15s ease;}
  .card:hover{transform:translateY(-3px);box-shadow:0 12px 24px rgba(42,32,24,.15);}
  .shot{aspect-ratio:1/1;background:radial-gradient(120% 90% at 50% 16%,#e3d8bd,#c9ba95);display:flex;align-items:center;justify-content:center;position:relative;border-bottom:1px solid var(--line);}
  .shot img{width:100%;height:100%;object-fit:cover;} .shot .boot{width:56%;color:var(--saddle);opacity:.55;}
  .cardbody{padding:12px 13px 15px;}
  .brand{font-family:"Inter",system-ui,sans-serif;font-weight:700;font-size:15px;letter-spacing:.02em;line-height:1.1;text-transform:uppercase;}
  .leather{font-family:"Inter",sans-serif;font-size:13px;font-weight:500;color:var(--saddle);margin-top:2px;}
  .stamp{font-family:"Inter",system-ui,sans-serif;font-size:11px;color:var(--ink-soft);margin-top:6px;font-weight:600;}
  .pricetag{font-family:"Inter",sans-serif;font-weight:800;font-size:17px;margin-top:8px;color:var(--ink);} .pricetag span{font-size:10px;color:var(--ink-soft);letter-spacing:.06em;margin-left:5px;font-weight:500;}
  .badge{position:absolute;top:10px;left:10px;background:var(--saddle);color:var(--sand);font-family:"Inter",system-ui,sans-serif;font-size:9px;letter-spacing:.1em;padding:3px 7px;border-radius:2px;text-transform:uppercase;}
  .badge.cross{background:var(--turq);}
  .btn{font-family:"Inter",system-ui,sans-serif;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:var(--saddle);color:var(--sand);border:0;border-radius:4px;padding:13px 20px;font-size:13px;cursor:pointer;transition:background .15s ease;display:inline-block;text-decoration:none;text-align:center;}
  .btn:hover{background:#83491f;} .btn:disabled{background:var(--turq);cursor:default;} .btn.block{width:100%;} .btn.sm{padding:8px 13px;font-size:11px;}
  .btn.ghost{background:transparent;color:var(--saddle);border:1px solid var(--saddle);} .btn.ghost:hover{background:var(--saddle);color:var(--sand);}
  .btn.danger{background:var(--oxblood);} .btn.danger:hover{background:#6f2a20;}
  .btn.turq{background:var(--turq);} .btn.turq:hover{background:#267a72;}
  .back{display:inline-block;margin:18px 0 4px;}
  .detail{display:grid;grid-template-columns:1fr 1fr;gap:34px;margin:10px 0 50px;align-items:start;}
  .detail .shot{aspect-ratio:1/1;border:1px solid var(--line);border-radius:3px;}
  .detail h1{font-size:30px;line-height:1;margin:2px 0 4px;}
  .thumbs{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;} .thumbs img{width:50px;height:50px;object-fit:cover;border:1px solid var(--line);border-radius:2px;cursor:pointer;}
  .spec{display:grid;grid-template-columns:auto 1fr;gap:7px 18px;font-family:"Inter",system-ui,sans-serif;font-size:13px;border-top:1.5px dashed var(--line);border-bottom:1.5px dashed var(--line);padding:15px 0;margin:16px 0;}
  .spec dt{color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em;font-size:11px;font-weight:700;font-family:"Inter",sans-serif;} .spec dd{margin:0;font-weight:600;color:var(--ink);font-size:14px;font-family:"Inter",sans-serif;}
  .bigprice{font-family:"Inter",sans-serif;font-weight:800;font-size:28px;margin:6px 0 4px;color:var(--ink);}
  .firm{font-family:"Inter",system-ui,sans-serif;font-size:11px;color:var(--ink-soft);letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px;}
  .note{color:var(--ink);opacity:.75;white-space:pre-line;font-size:14px;}
  h2.sec{font-size:24px;margin:24px 0 8px;}
  .line{display:flex;gap:14px;align-items:center;padding:14px 0;border-bottom:1px solid var(--line);}
  .line .shot{width:64px;height:64px;aspect-ratio:1;border-radius:2px;flex:none;} .line .grow{flex:1;}
  .totals{background:var(--sand-2);border:1px solid var(--line);border-radius:6px;padding:16px 18px;margin:16px 0;}
  .trow{display:flex;justify-content:space-between;font-family:"Inter",system-ui,sans-serif;font-size:14px;padding:3px 0;}
  .trow.grand{font-weight:700;font-size:17px;border-top:1.5px dashed var(--line);margin-top:8px;padding-top:10px;}
  .formgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:14px 0;}
  .formgrid label{display:flex;flex-direction:column;gap:5px;font-family:"Inter",system-ui,sans-serif;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);}
  .formgrid .full{grid-column:1/-1;}
  .formgrid input,.formgrid select,.formgrid textarea{font-family:"Work Sans";font-size:14px;text-transform:none;letter-spacing:0;color:var(--ink);padding:10px 11px;border:1px solid var(--line);background:#fff;border-radius:4px;}
  .formgrid label.inline{flex-direction:row;align-items:center;gap:7px;display:inline-flex;margin-right:16px;text-transform:none;font-size:13px;letter-spacing:0;color:var(--ink);}
  fieldset{border:1px solid var(--line);border-radius:4px;} legend{font-family:"Inter",system-ui,sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);padding:0 6px;}
  @media (max-width:640px){.formgrid{grid-template-columns:1fr;}}
  .slip{background:#fff;border:1px solid var(--line);border-radius:6px;padding:24px;margin:14px 0 50px;}
  .slip .top{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--ink);padding-bottom:12px;}
  .slip .top .l1{font-family:"Ultra",serif;font-size:22px;} .slip .invno{font-family:"Inter",system-ui,sans-serif;font-size:12px;color:var(--ink-soft);text-align:right;}
  .slip h3{font-family:"Inter",system-ui,sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin:16px 0 4px;}
  .slip table{width:100%;border-collapse:collapse;margin:8px 0;font-family:"Inter",system-ui,sans-serif;font-size:13px;}
  .slip th,.slip td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line);} .slip td.r,.slip th.r{text-align:right;}
  .policybox{background:var(--sand-2);border:1.5px dashed var(--brass);border-radius:6px;padding:12px 14px;margin-top:14px;font-family:"Inter",system-ui,sans-serif;font-size:12px;line-height:1.7;}
  .adm{width:100%;border-collapse:collapse;font-family:"Inter",system-ui,sans-serif;font-size:12px;margin:12px 0;}
  .adm th,.adm td{text-align:left;padding:7px 7px;border-bottom:1px solid var(--line);vertical-align:middle;} .adm img{width:38px;height:38px;object-fit:cover;border-radius:2px;}
  .ordbox{background:var(--sand-2);border:1px solid var(--line);border-left:3px solid var(--saddle);border-radius:4px;padding:14px 16px;margin:12px 0;}
  .banner{background:#e6dcc4;border:1.5px dashed var(--brass);border-radius:4px;padding:9px 14px;font-family:"Inter",system-ui,sans-serif;font-size:11.5px;color:var(--ink-soft);margin:14px 0;}
  .fixcard{display:grid;grid-template-columns:96px 1fr;gap:14px;background:#fff;border:1px solid var(--line);border-left:3px solid var(--need);border-radius:4px;padding:14px;margin:12px 0;}
  .fixcard .shot{width:96px;height:96px;aspect-ratio:1;border-radius:2px;}
  .fixgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;align-items:end;}
  .fixgrid label{display:flex;flex-direction:column;gap:4px;font-family:"Inter",system-ui,sans-serif;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);}
  .fixgrid input{font-family:"Work Sans";font-size:14px;padding:8px 10px;border:1px solid var(--line);background:#fff;border-radius:3px;}
  .fixgrid label.need span{color:var(--need);} .fixgrid label.need input{border-color:var(--need);background:#fbf1ee;}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;} .chip{font-family:"Inter",system-ui,sans-serif;font-size:11px;border:1px solid var(--turq);color:var(--turq);background:transparent;border-radius:20px;padding:3px 10px;cursor:pointer;} .chip:hover{background:var(--turq);color:#fff;}
  .admsearch{width:100%;max-width:440px;margin:4px 0 8px;padding:9px 12px;border:1px solid var(--line);background:#fff;border-radius:4px;font-size:14px;}
  .carrbtn{display:inline-flex;align-items:center;justify-content:center;min-width:96px;height:56px;padding:8px 14px;background:#fff;border:2px solid var(--line);border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;font-size:13px;color:var(--ink);}
  .carrbtn img{height:34px;display:block;}
  .carrbtn.sel{border-color:var(--saddle);background:var(--sand-2);box-shadow:0 0 0 1px var(--saddle);}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
  .policybanner{width:100%;display:block;height:auto;transform:scaleY(1);}

function normalizeState(v){
  if(!v) return '';
  const t=v.trim();
  const up=t.toUpperCase();
  for(const [name,ab] of US_STATES){ if(up===ab) return ab; }
  const low=t.toLowerCase();
  for(const [name,ab] of US_STATES){ if(low===name.toLowerCase()) return ab; }
  for(const [name,ab] of US_STATES){ if(name.toLowerCase().startsWith(low)&&low.length>=3) return ab; }

}
const RANGE={ M:{lo:7,hi:15}, W:{lo:5,hi:12} };
function combinedSizeList(){

function matchSize(sz,dept){if(!filt.sizes.size)return true;const b=RANGE[dept];

function search(){

    if(dept==='M'){ if(p.gender!=='M')continue; if(!matchSize(p.size,'M'))continue; out.push({...p,dsize:p.size,dwidth:p.width,cross:false}); }
    else{ let comp,cross,dw;
      if(p.gender==='W'){comp=p.size;cross=false;dw=p.width;}
      else if(p.gender==='M'&&p.women_size!=null){comp=p.women_size;cross=true;dw='';}
      else continue;
      if(!matchSize(comp,'W'))continue; out.push({...p,dsize:comp,dwidth:dw,cross}); }

}

let SHIP_BANNER_DEFAULT_SRC=null;
function go(v,a){
  const h=document.getElementById('hero');
  if(h) h.classList.toggle('wholesale', v==='wholesale');
  const sb2=document.getElementById('shipBanner');
  if(sb2){
    if(SHIP_BANNER_DEFAULT_SRC===null) SHIP_BANNER_DEFAULT_SRC=sb2.src;
    if(v==='staff'){ sb2.style.display='none'; }
    else{
      sb2.style.display='block';
      sb2.src=(v==='wholesale')?WHOLESALE_BANNER_SRC:SHIP_BANNER_DEFAULT_SRC;
    }
  }
  ({catalog:catalogView,product:productView,cart:cartView,receipt:receiptView,admin:adminView,contact:contactView,global:globalView,corral:corralView,wholesale:wholesaleView,staffLogin:staffLoginView,staff:staffView}[v])(a);
  window.scrollTo(0,0);
}

const POLICIES=``;

function catalogView(){
  setMeta("Dan's Boot Sale — Vintage & Exotic Western Boots","Vintage and exotic western boots, inspected and specced by hand. Free USA shipping and returns.",null);
  const items=search();
  V().innerHTML=`
    ${POLICIES}
    <div class="controls">
      <div class="ctl-label">Size type</div>
      <div class="group">
        <button class="seg ${filt.gender==='M'?'active':''}" onclick="setGender('M')">Men's</button>
        <button class="seg ${filt.gender==='W'?'active':''}" onclick="setGender('W')">Women's</button>
        <input type="search" id="topsearch" placeholder="Search brand, leather, keyword…" value="${esc(filt.brand)}" oninput="setBrand(this.value)" style="flex:1;min-width:180px;font-family:'Work Sans';font-size:14px;padding:8px 12px;border:1px solid var(--saddle);background:#fff;border-radius:4px;color:var(--ink)">
      </div>
      <div class="ctl-label" style="margin-top:16px">Size · ${filt.gender==='M'?"Men's":"Women's"}</div>
      <div class="group sizes">${sizeButtons(filt.gender)}</div>
      <div class="row"><button class="link" onclick="clearSizes()">Reset sizes</button><span class="muted">${items.length} pair${items.length===1?'':'s'} in stock</span></div>
      ${cardsHtml(items)}
    </div>`;
}
function isDefaultView(){ return !filt.brand.trim() && filt.sizes.size===0; }
function cardsHtml(items){
  if(!items.length) return '<div class="grid"><p class="muted">No pairs match. Try the other department or clear the search.</p></div>';
  const card=p=>`<div class="card" onclick="go('product',${p.id})">${shot(p)}
      <div class="cardbody"><div class="brand">${esc(p.brand)}</div>
        <div class="leather">${esc(p.material||'')}</div>
        <div class="stamp">${p.cross?"WMN":(p.gender==='M'?"MEN":"WMN")} · US ${p.dsize ?? '?'}${p.dwidth?' '+esc(p.dwidth):''}${p.cross?' · converted from Men\'s':''}</div>
        <div class="pricetag">$${p.price.toFixed(0)}<span>firm</span></div></div>
    </div>`;
  const capped=isDefaultView() && items.length>20;
  let shown=items;
  if(capped){
    shown=[...items].sort((a,b)=>b.id-a.id).slice(0,20);
  }
  const real=shown.filter(p=>!p.cross), conv=shown.filter(p=>p.cross);
  const rShow=real, cShow=conv;
  let grid;
  if(!cShow.length) grid=`<div class="grid">${rShow.map(card).join('')}</div>`;
  else if(!rShow.length) grid=`<div class="grid">${cShow.map(card).join('')}</div>`;
  else grid=`<div class="grid">${rShow.map(card).join('')}</div>
    <div class="ctl-label" style="margin:22px 0 10px">Men's boots, converted to women's sizing</div>
    <div class="grid">${cShow.map(card).join('')}</div>`;
  if(capped) grid+=`<p class="muted" style="text-align:center;margin-top:18px;text-transform:none;letter-spacing:0">Showing the 20 most recently added of ${items.length} pairs — search or pick a size to see more.</p>`;
  return grid;
}
function setGender(g){filt.gender=g;filt.sizes.clear();catalogView();}
function setBrand(v){filt.brand=v;catalogView();const i=document.getElementById('topsearch');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length);}}
function toggleSize(t){const tok=(t==='lo'||t==='hi')?t:Number(t);filt.sizes.has(tok)?filt.sizes.delete(tok):filt.sizes.add(tok);catalogView();}
function clearSizes(){filt.sizes.clear();catalogView();}

function productView(id){
  const p=products.find(x=>x.id===id), sold=p.status==='sold';
  setMeta(`${p.brand}${p.material?' '+p.material:''} — ${p.gender==='M'?"Men's":"Women's"} US ${p.size} | Dan's Boot Sale`,
    `${p.brand} ${p.material||'western boots'}, ${p.gender==='M'?"men's":"women's"} US ${p.size}${p.width?' '+p.width:''}. $${p.price.toFixed(0)} firm. Free USA shipping & returns.`, p);
  V().innerHTML=`<a class="link back" onclick="go('catalog')">← Back to stock</a>
    <div class="detail"><div>${shot(p)}${p.photos&&p.photos.length>1?`<div class="thumbs">${p.photos.slice(0,30).map(u=>`<img src="${esc(u)}" alt="${esc(p.brand)}" loading="lazy" onclick="this.closest('.detail').querySelector('.shot img').src=this.src">`).join('')}</div>`:''}</div>
      <div><div class="muted">${lot(p.id)} · ${p.gender==='M'?"Men's":"Women's"}</div>
        <h1>${esc(p.brand)}</h1>
        <p style="font-size:14px;color:var(--ink-soft);line-height:1.35;margin:2px 0">${esc(p.title||'')}</p>
        <dl class="spec">
          <dt>Size</dt><dd>US ${p.size ?? '?'}</dd>
          <dt>Width</dt><dd>${p.width?esc(p.width):'—'}</dd>
          ${p.gender==='M'&&p.women_size!=null?`<dt>Also fits</dt><dd>Women's US ${p.women_size}</dd>`:''}
          <dt>Leather</dt><dd>${esc(p.material)||'—'}</dd>
          <dt>Gender</dt><dd>${p.gender==='M'?"Men's":"Women's"}</dd>
</dl>
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          <div class="bigprice" style="margin:0">$${p.price.toFixed(0)}</div>
          ${sold?'<p class="muted" style="margin:0">This pair has been claimed.</p>':cart.includes(p.id)?`<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap"><span class="btn" id="add" style="background:var(--sand-2);color:var(--ink);cursor:default">In cart ✓</span><button class="btn" onclick="go('cart')">Go to cart →</button></div>`:`<button class="btn" id="add" onclick="addCart(${p.id})">Add to cart</button>`}
        </div>
        <div class="firm">Price firm · free USA shipping · free USA returns</div>
        ${p.notes?`<p class="note">${esc(p.notes)}</p>`:''}
      </div></div>`;

let staffDraft={gender:'',brand:'',size:null,sizeManual:'',width:'',noWidth:false,leather:'',wsprice:'',condition:null,notes:'',photos:[],uploading:false};
let staffEditingId=null;
function staffEditItem(id){
  const p=products.find(x=>x.id===id); if(!p) return;
  staffDraft={
    gender:p.gender||'U', brand:p.brand||'', size:p.size!=null?p.size:null, sizeManual:'',
    width:p.width||'', noWidth:!!p.no_width, leather:p.material||'',
    wsprice:p.wholesale_price!=null?String(p.wholesale_price):'', condition:p.condition||null,
    notes:p.notes||'', photos:[...(p.photos||[])], uploading:false
  };
  staffEditingId=id; staffMode='form'; window.scrollTo(0,0); staffView();
}
let staffMode='form';
function staffRow(p){
  return `<div class="line">
    ${shot(p)}
    <div class="grow">
      <div class="brand" style="font-size:14px">${esc(p.brand||'(no brand yet)')}</div>
      <div class="stamp">${esc(p.material||'')} · ${p.gender==='M'?"Men's":p.gender==='W'?"Women's":'Unknown'} ${p.size ?? '?'}${p.width?' '+esc(p.width):''} · $${p.wholesale_price!=null?p.wholesale_price.toFixed(0):'?'} wholesale</div>
    </div>
    <button class="btn sm ghost" onclick="staffEditItem(${p.id})">Edit</button>
  </div>`;
}
function editPending(){ staffMode='list'; staffView(); }
function staffBackToForm(){ staffMode='form'; staffView(); }
function staffCancelEdit(){
  staffEditingId=null;
  staffDraft={gender:'',brand:'',size:null,sizeManual:'',width:'',noWidth:false,leather:'',wsprice:'',condition:null,notes:'',photos:[],uploading:false};
  staffView();
}

function setStaffGender(g){staffDraft.gender=g;staffDraft.size=null;staffView();}
function setStaffSize(s){staffDraft.size=s;staffDraft.sizeManual='';staffView();}
function setStaffCondition(n){staffDraft.condition=(staffDraft.condition===n?null:n);staffView();}
function toggleStaffNoWidth(chk){staffDraft.noWidth=chk;staffView();}
function syncStaff(field,val){staffDraft[field]=val;}

function staffSizeChips(){
  const manualBox=`<div style="margin-top:8px"><input id="s_size_manual" type="number" step="0.5" placeholder="Size outside the range above? Enter it here" value="${esc(staffDraft.sizeManual)}" oninput="syncStaff('sizeManual',this.value)" style="max-width:260px"></div>`;
  if(!staffDraft.gender) return '<p class="muted" style="text-transform:none;letter-spacing:0;font-size:13px">Choose a gender above to see sizes, or enter one manually below.</p>'+manualBox;
  const list=staffDraft.gender==='U'?combinedSizeList():
    (()=>{const b=RANGE[staffDraft.gender];const out=[];for(let s=b.lo;s<=b.hi;s+=0.5)out.push(s);return out;})();
  return `<div class="group sizes">${list.map(s=>`<button type="button" class="size ${staffDraft.size===s?'active':''}" onclick="setStaffSize(${s})">${s}</button>`).join('')}</div>${manualBox}`;
}

async function staffUploadPhotos(input){
  const files=Array.from(input.files||[]);
  if(!files.length) return;
  staffDraft.uploading=true; staffView();
  for(const file of files){
    const path=`staff/${Date.now()}-${Math.random().toString(36).slice(2)}-${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
    const {error}=await sb.storage.from('wholesale-photos').upload(path,file);
    if(error){ alert('Upload failed for '+file.name+': '+error.message); continue; }
    const {data}=sb.storage.from('wholesale-photos').getPublicUrl(path);
    if(data&&data.publicUrl) staffDraft.photos.push(data.publicUrl);
  }
  staffDraft.uploading=false; staffView();
}
function removeStaffPhoto(i){staffDraft.photos.splice(i,1);staffView();}

async function saveStaffItem(){
  const g=id=>{const el=document.getElementById(id); return el?el.value.trim():'';};
  staffDraft.brand=g('s_brand'); staffDraft.width=g('s_width'); staffDraft.leather=g('s_leather');
  staffDraft.wsprice=g('s_wsprice'); staffDraft.notes=g('s_notes'); staffDraft.sizeManual=g('s_size_manual');
  if(!staffDraft.gender){ alert("Please select a gender (Men's, Women's, or Unknown) before saving."); return; }
  const manualSize=parseFloat(staffDraft.sizeManual);
  const finalSize=(!isNaN(manualSize)&&manualSize>0)?manualSize:staffDraft.size;
  const wsPrice=parseFloat(staffDraft.wsprice); const wholesale_price=(wsPrice>0)?wsPrice:null;
  const width=staffDraft.noWidth?'':(staffDraft.width||'').toUpperCase();
  const rec={
    gender:staffDraft.gender==='U'?null:staffDraft.gender,
    brand:staffDraft.brand||null, size:finalSize, width, no_width:staffDraft.noWidth,
    material:staffDraft.leather||null, price:null, wholesale_price, wholesale:true,
    condition:staffDraft.condition, notes:staffDraft.notes||null, photos:staffDraft.photos,
    women_size:null, women_width:null, suggest:[], status:'draft', missing:[],
    updated_at:new Date().toISOString()
  };
  let error;
  if(staffEditingId){ ({error}=await sb.from('products').update(rec).eq('id',staffEditingId)); }
  else { ({error}=await sb.from('products').insert(rec)); }
  if(error){ alert(error.message); return; }
  const wasEditing=!!staffEditingId;
  staffEditingId=null;
  staffDraft={gender:'',brand:'',size:null,sizeManual:'',width:'',noWidth:false,leather:'',wsprice:'',condition:null,notes:'',photos:[],uploading:false};
  await loadProducts();
  alert(wasEditing?'Changes saved.':'Saved. This item is now waiting for review in Needs Review Wholesale.');
  staffView();
}

function staffView(){
  setMeta("Staff | Dan's Boot Sale","",null);
  if(staffMode==='list'){
    const pending=products.filter(p=>p.status==='draft'&&p.wholesale);
    pending.sort((a,b)=>new Date(b.updated_at||b.created_at||0)-new Date(a.updated_at||a.created_at||0));
    V().innerHTML=`<a class="link back" onclick="staffBackToForm()">← Back</a>
      <h3 class="ctl-label" style="margin-top:18px">Needs Review Wholesale ${pending.length?`(${pending.length})`:''}</h3>
      ${pending.length?pending.map(staffRow).join(''):'<p class="muted">Nothing waiting on review right now.</p>'}`;
    return;
  }
  const brands=[...new Set(products.map(p=>p.brand).filter(Boolean))].sort();
  const genderLabel=staffDraft.gender==='M'?"Men's":staffDraft.gender==='W'?"Women's":staffDraft.gender==='U'?'Unknown':'';
  V().innerHTML=`<a class="link back" onclick="corralChoiceView()">← Back to Corral</a>
    <h3 class="ctl-label" style="margin-top:18px">${staffEditingId?'Edit wholesale only item':'Add wholesale only item'}</h3>
    <div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      <button class="btn" onclick="saveStaffItem()">${staffEditingId?'Save changes':'Save Item'}</button>
      <button class="btn ghost" onclick="editPending()">Edit Pending</button>
      ${staffEditingId?`<button class="btn ghost" onclick="staffCancelEdit()">Cancel edit</button>`:''}
    </div>
    <div class="formgrid">
      <label>Gender
        <select onchange="setStaffGender(this.value)">
          <option value="" ${!staffDraft.gender?'selected':''} disabled>Select gender…</option>
          <option value="M" ${staffDraft.gender==='M'?'selected':''}>Men's</option>
          <option value="W" ${staffDraft.gender==='W'?'selected':''}>Women's</option>
          <option value="U" ${staffDraft.gender==='U'?'selected':''}>Unknown</option>
        </select>
      </label>
      <label>Brand<input id="s_brand" list="staffBrands" value="${esc(staffDraft.brand)}" oninput="syncStaff('brand',this.value)"></label>
      <datalist id="staffBrands">${brands.map(b=>`<option value="${esc(b)}">`).join('')}</datalist>
      <label class="full">Size ${genderLabel?'· '+genderLabel:''}${staffDraft.gender==='U'?' (combined range)':''}
        ${staffSizeChips()}
      </label>

      <label>Wholesale Price (USD)<input id="s_wsprice" type="number" step="0.01" value="${esc(staffDraft.wsprice)}" oninput="syncStaff('wsprice',this.value)"></label>

      </label>
    </div>

}

let filtWS={ gender:'M', sizes:new Set(), brand:'' };
function setGenderWS(g){filtWS.gender=g;filtWS.sizes.clear();wholesaleView();}
function setBrandWS(v){filtWS.brand=v;wholesaleView();const i=document.getElementById('wssearch');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length);}}
function toggleSizeWS(t){const tok=(t==='lo'||t==='hi')?t:Number(t);filtWS.sizes.has(tok)?filtWS.sizes.delete(tok):filtWS.sizes.add(tok);wholesaleView();}
function clearSizesWS(){filtWS.sizes.clear();wholesaleView();}
function btWS(tok,label){return `<button class="size ${filtWS.sizes.has(tok)?'active':''}" onclick="toggleSizeWS('${tok}')">${label}</button>`;}
function sizeButtonsWS(dept){const b=RANGE[dept];const out=[btWS('lo',dept==='M'?'7 & under':'5 & under')];
  for(let s=b.lo+0.5;s<b.hi;s+=0.5) out.push(btWS(s,String(s)));
  out.push(btWS('hi',dept==='M'?'15 & over':'12 & over'));return out.join('');
}
function matchSizeWS(sz,dept){if(!filtWS.sizes.size)return true;const b=RANGE[dept];
  for(const t of filtWS.sizes){if(t==='lo'&&sz<=b.lo)return true;if(t==='hi'&&sz>=b.hi)return true;if(t!=='lo'&&t!=='hi'&&sz===Number(t))return true;}return false;}
function searchWS(){
  const dept=filtWS.gender, brand=filtWS.brand.trim().toLowerCase(), out=[];
  for(const p of products){
    if(p.status!=='published'||!p.wholesale) continue;
    if(p.gender!==dept) continue;
    if(brand && !((p.brand+' '+(p.title||'')+' '+(p.material||'')).toLowerCase().includes(brand))) continue;
    if(!matchSizeWS(p.size,dept)) continue;
    out.push({...p,dsize:p.size,dwidth:p.width});
  }
  return out.sort((a,b)=>a.brand.localeCompare(b.brand)||(a.dsize||0)-(b.dsize||0));
}
function cardWS(p){
  return `<div class="card">${shot(p)}
      <div class="cardbody"><div class="brand">${esc(p.brand)}</div>
        <div class="leather">${esc(p.material||'')}</div>
        <div class="stamp">${p.gender==='M'?"MEN":"WMN"} · US ${p.dsize ?? '?'}${p.dwidth?' '+esc(p.dwidth):''}</div>
        <div class="pricetag">$${p.wholesale_price!=null?p.wholesale_price.toFixed(0):'?'}<span>wholesale</span></div></div>
    </div>`;
}
function cardsHtmlWS(items){
  if(!items.length) return '<div class="grid"><p class="muted">No pairs match. Try the other department or clear the search.</p></div>';
  return `<div class="grid">${items.map(cardWS).join('')}</div>`;
}
function wholesaleView(){
  setMeta("Wholesale | Dan's Boot Sale","Bulk and wholesale western boots for retailers and resellers.",null);
  const items=searchWS();
  V().innerHTML=`<a class="link back" onclick="corralChoiceView()">← Back to Corral</a>
    <div class="controls">
      <div class="ctl-label">Size type</div>
      <div class="group">
        <button class="seg ${filtWS.gender==='M'?'active':''}" onclick="setGenderWS('M')">Men's</button>
        <button class="seg ${filtWS.gender==='W'?'active':''}" onclick="setGenderWS('W')">Women's</button>
        <input type="search" id="wssearch" placeholder="Search brand, leather, keyword…" value="${esc(filtWS.brand)}" oninput="setBrandWS(this.value)" style="flex:1;min-width:180px;font-family:'Work Sans';font-size:14px;padding:8px 12px;border:1px solid var(--saddle);background:#fff;border-radius:4px;color:var(--ink)">
      </div>
      <div class="ctl-label" style="margin-top:16px">Size · ${filtWS.gender==='M'?"Men's":"Women's"}</div>
      <div class="group sizes">${sizeButtonsWS(filtWS.gender)}</div>
      <div class="row"><button class="link" onclick="clearSizesWS()">Reset sizes</button><span class="muted">${items.length} pairs available for wholesale</span></div>
    </div>
    ${cardsHtmlWS(items)}`;
}
function cartView(){
  setMeta("Your Cart | Dan's Boot Sale","",null);
  const items=cart.map(id=>products.find(p=>p.id===id)).filter(p=>p&&p.status!=='sold');
  cart=items.map(p=>p.id);badge();
  if(!items.length){checkoutStep=1;V().innerHTML=`<a class="link back" onclick="go('catalog')">← Back to stock</a><h2 class="sec">Your cart</h2><p class="muted">Empty for now. Every pair is one-of-one — add the ones you want.</p>`+horseshoe();return;}
  if(checkoutStep===2){ cartPage2(items); return; }
  cartPage1(items);
}

function cartPage1(items){
  const pr=priceCart(items);
  V().innerHTML=`<a class="link back" onclick="go('catalog')">← Keep browsing</a><h2 class="sec">Your cart</h2>
    ${items.map(p=>`<div class="line">${shot(p)}<div class="grow"><div class="brand" style="font-size:14px">${esc(p.brand)}</div>
      <div class="stamp">${esc(p.material||'')} · US ${p.size ?? '?'}${p.width?' '+esc(p.width):''}</div></div>
      <div class="mono">$${p.price.toFixed(0)}</div><button class="link" onclick="rmCart(${p.id})">remove</button></div>`).join('')}
    ${pr.subtotal>=125?`<div class="line" style="align-items:center;padding:12px 0">
      <div class="grow">
        <label class="inline" style="font-size:14px;font-family:'Inter',sans-serif;font-weight:600;color:var(--ink);gap:10px;cursor:pointer">
          <input type="checkbox" id="insCheck" ${pr.insurance>0?'checked':''} onchange="setIns(this.checked?${pr.subtotal<250?5:10}:0)" style="width:18px;height:18px;cursor:pointer">
          <span>Add Shipping Insurance <strong>$${pr.subtotal<250?'5.00':'10.00'}</strong></span>
        </label>
        <div class="muted" style="text-transform:none;letter-spacing:0;margin-top:3px;padding-left:28px">Covers lost or damaged packages in transit</div>
      </div>
    </div>`:''}
    <div style="margin:10px 0 4px"><button class="link" onclick="go('global')" style="font-family:'Inter',sans-serif;font-size:13px">🌎 Global Delivery Request →</button></div>
    <div class="totals">
      <div class="trow"><span>Subtotal</span><span>$${pr.subtotal.toFixed(2)}</span></div>
      <div class="trow"><span>USA shipping</span><span>Free</span></div>
      ${pr.subtotal>=125?`<div class="trow"><span>${pr.insurance>0?'Shipping insurance':'Optional Shipping Insurance <u>not selected</u>'}</span><span>${pr.insurance>0?'$'+pr.insurance.toFixed(2):'—'}</span></div>`:''}
      <div class="trow grand"><span>Total</span><span>$${pr.total.toFixed(2)}</span></div></div>

    <h3 class="ctl-label" style="margin-top:18px">Preferred payment method</h3>
    <p class="muted" style="text-transform:none;letter-spacing:0">We only record your preference — no account details are entered here.</p>
    <div class="formgrid"><label>Method<select id="f_pm"><option>Zelle</option><option>PayPal</option><option>PayPal Goods &amp; Services</option><option>Cash App</option><option>Venmo</option><option>Venmo Goods &amp; Services</option></select></label></div>

    <button class="btn block" style="margin-top:14px" onclick="confirmCart()">Confirm Cart</button>`+horseshoe();
  if(checkoutData.payment){ const pm=document.getElementById('f_pm'); if(pm) pm.value=checkoutData.payment; }
}

function confirmCart(){
  const pm=document.getElementById('f_pm');
  checkoutData.payment = pm?pm.value:'Zelle';
  checkoutStep=2;
  cartView();
}

function backToCart(){
  checkoutData.first=(document.getElementById('s_first')||{}).value||checkoutData.first;
  checkoutData.last=(document.getElementById('s_last')||{}).value||checkoutData.last;
  checkoutData.street=(document.getElementById('s_street')||{}).value||checkoutData.street;
  checkoutData.apt=(document.getElementById('s_apt')||{}).value||checkoutData.apt;
  checkoutData.city=(document.getElementById('s_city')||{}).value||checkoutData.city;
  checkoutData.state=(document.getElementById('s_state')||{}).value||checkoutData.state;
  checkoutData.zip=(document.getElementById('s_zip')||{}).value||checkoutData.zip;
  checkoutStep=1; cartView();
}

function setIns(v){insVal=v;insTouched=true;cartView();}

function carrierPick2(v){
  let carr=checkoutData.carriers||['No Preference'];
  if(v==='No Preference'){ carr=['No Preference']; }
  else {
    carr=carr.filter(x=>x!=='No Preference');
    if(carr.includes(v)) carr=carr.filter(x=>x!==v); else carr.push(v);
    if(!carr.length) carr=['No Preference'];
  }
  checkoutData.carriers=carr;
  // preserve address field entries before re-render
  backToCartPreserveThenPage2();
}
function backToCartPreserveThenPage2(){
  ['first','last','street','apt','city','state','zip'].forEach(k=>{
    const el=document.getElementById('s_'+k); if(el) checkoutData[k]=el.value;
  });
  const cmEl=document.getElementById('cm_val'); if(cmEl) checkoutData.cmVal=cmEl.value;
  const items=cart.map(id=>products.find(p=>p.id===id)).filter(p=>p&&p.status!=='sold');
  cartPage2(items);
}

function rmCart(id){cart=cart.filter(x=>x!==id);checkoutStep=1;cartView();}

function setCM(m){
  document.querySelectorAll('[name=cm]').forEach(r=>{if(r.value===m)r.checked=true;});
  const el=document.getElementById('cmField'); if(!el) return;
  const v=esc(checkoutData.cmVal||'');
  el.innerHTML = m==='Text'?`<label>Phone number *<input id="cm_val" placeholder="e.g. 404-555-1234" value="${v}"></label>`
    : m==='Facebook'?`<label>Facebook profile URL *<input id="cm_val" placeholder="facebook.com/yourname" value="${v}"></label>`
    : m==='Reddit'?`<label>Reddit username *<input id="cm_val" placeholder="yourname" value="${v}"></label>`
    : `<label>How should we reach you? *<input id="cm_val" placeholder="Email, WhatsApp, etc." value="${v}"></label>`;
  checkoutData.cm=m;
}

async function commit(){
  const g=id=>(document.getElementById(id)||{}).value?.trim()||'';
  const first=g('s_first'),last=g('s_last'),street=g('s_street'),city=g('s_city'),zip=g('s_zip');
  const state=normalizeState(g('s_state'));
  const cm=(document.querySelector('[name=cm]:checked')||{}).value||'Text';
  const cmVal=g('cm_val');
  const req=[['First name',first],['Last name',last],['Street',street],['City',city],['State',state],['ZIP',zip],['Contact info',cmVal]];
  const missing=req.filter(r=>!r[1]).map(r=>r[0]);
  if(missing.length){alert('Please fill: '+missing.join(', '));return;}
  const items=cart.map(id=>products.find(p=>p.id===id));const pr=priceCart(items);
  const carriers=checkoutData.carriers||['No Preference'];
  const payment=checkoutData.payment||'Zelle';
  const lineItems=items.map(p=>({brand:p.brand,material:p.material,size:p.size,width:p.width,lot:lot(p.id),price:p.price,photo:(p.photos&&p.photos[0])||null}));
  const row={status:'pending',first_name:first,last_name:last,street,apt:g('s_apt'),city,state,zip,country:'USA',
    contact_method:cm,contact_value:cmVal,payment,carriers,insurance:pr.insurance,
    subtotal:pr.subtotal,total:pr.total,items:lineItems};
  const {error}=await sb.from('orders').insert(row);
  if(error){alert('Could not submit request: '+error.message);return;}
  // Pull every ordered item off the market — on both the retail and wholesale sides —
  // the instant a purchase request comes in, so it can't be double-ordered from the other channel.
  const orderedIds=cart.slice();
  if(orderedIds.length){
    const{error:soldErr}=await sb.from('products').update({status:'sold'}).in('id',orderedIds);
    if(soldErr) console.error('Could not mark items sold:',soldErr);
  }
  await loadProducts();
  const o={id:orders.length+1,first,last,street,apt:g('s_apt'),city,state,zip,country:'USA',
    contactMethod:cm,contactValue:cmVal,payment,carriers,insurance:pr.insurance,items:lineItems,...pr};
  orders.push(o);cart=[];insVal=null;insTouched=false;checkoutStep=1;checkoutData={};badge();go('receipt',o.id);
}
function contactView(){
  setMeta("Contact | Dan's Boot Sale","Text, message on Facebook, or reach Dan on Reddit.",null);
  V().innerHTML='<a class="link back" onclick="go(\'catalog\')">← Back to stock</a>'
    +'<h1 style="font-size:28px;margin-top:16px">Contact Dan</h1>'

  if(!o){go("catalog");return;}
  const insRow=o.insurance>0?"<div class=\"trow\"><span>Shipping insurance</span><span>$"+o.insurance.toFixed(2)+"</span></div>":(Number(o.subtotal)>=125?"<div class=\"trow\"><span>Optional Shipping Insurance <u>not selected</u></span><span>—</span></div>":"");
  const itemRows=o.items.map(function(it){
    return "<tr><td>"+esc(it.brand)+(it.material?" — "+esc(it.material):"")
      +" <span class=\"muted\">"+esc(it.lot||"")+"</span></td>"
      +"<td>US "+(it.size||"?")+(it.width?" "+esc(it.width):"")+"</td>"

  const ph=PHONE;
  V().innerHTML=

async function loadProducts(){
  let data,error;
  try{({data,error}=await sb.from('products').select('*').order('id'));}catch(e){console.warn('DB offline');return;}
  if(error){console.error('load',error);return;}
  products=(data||[]).map(r=>({...r,
    size:r.size!=null?Number(r.size):null, price:r.price!=null?Number(r.price):null,
    wholesale_price:r.wholesale_price!=null?Number(r.wholesale_price):null,
    women_size:r.women_size!=null?Number(r.women_size):null,
    photos:Array.isArray(r.photos)?r.photos:[], missing:Array.isArray(r.missing)?r.missing:[], suggest:Array.isArray(r.suggest)?r.suggest:[]}));

let csvStaged=[];
function csvFileChosen(input){
  const file=input.files&&input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{ csvParse(e.target.result); };
  reader.readAsText(file);

function parsePriceStr(raw){
  if(!raw) return null;
  const cleaned=String(raw).replace(/[$,]/g,'').trim();
  const m=cleaned.match(/^(\d+(?:\.\d{1,2})?)$/);
  if(!m) return null;
  const val=parseFloat(m[1]);
  return (val>0)?val:null;
}
function extractGroupPrice(notes){
  if(!notes) return null;
  const m=String(notes).match(/group\s*(?:price)?\s*:?\s*\$?\s*(\d+(?:\.\d{1,2})?)/i);
  if(!m) return null;
  const val=parseFloat(m[1]);
  return (val>0)?val:null;
}
function csvParseFull(text){
  // Full-file CSV tokenizer: respects quoted fields that contain embedded
  // newlines or commas (e.g. multi-line photo galleries), unlike a naive
  // line-by-line split which shreds those fields into fake extra rows.
  const rows=[]; let row=[]; let cur=''; let inQ=false; let i=0; const n=text.length;
  while(i<n){
    const c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){ cur+='"'; i+=2; continue; } inQ=false; i++; continue; }
      cur+=c; i++; continue;
    }
    if(c==='"'){ inQ=true; i++; continue; }
    if(c===','){ row.push(cur); cur=''; i++; continue; }
    if(c==='\r'){ i++; continue; }
    if(c==='\n'){ row.push(cur); cur=''; rows.push(row); row=[]; i++; continue; }
    cur+=c; i++;
  }
  if(cur.length||row.length){ row.push(cur); rows.push(row); }
  return rows.filter(r=>r.length>1||(r[0]&&r[0].trim().length));
}

function csvParse(text){
  const allRows=csvParseFull(text);
  if(!allRows.length){ csvStaged=[]; adminView(); return; }
  const headers=allRows[0].map(h=>h.trim());
  const idx=name=>headers.findIndex(h=>h.toLowerCase()===name.toLowerCase());
  const iTitle=idx('Title'), iBrand=idx('Brand'), iDesc=idx('Description'), iPrice=idx('Price'), iNotes=idx('Notes');
  const iSKU=idx('SKU');
  const iMain=idx('Main Image'), iGal=idx('Image Gallery'), iMaterial=idx('Material');
  const rows=[];
  for(let li=1; li<allRows.length; li++){
    const cells=allRows[li];
    const title=(cells[iTitle]||'').trim();
    if(!title) continue;
    const desc=(cells[iDesc]||'').trim();
    let brand=(cells[iBrand]||'').trim();
    if(!brand){
      const m=title.match(/^(Vintage\s+)?([A-Za-z][A-Za-z .&']+?)(?=\s+(Men'?s|Women'?s|Mens|Womens|\d))/i);
      brand=m?m[2].trim():'Unknown';
    }
    const gender=/\bcowgirl\b|\bladies\b|\blady'?s\b|\bwomen'?s?\b/i.test(title)?'W':'M';
    const sizeMatch=title.match(new RegExp(WID.source? '(\\d+(?:\\.\\d+)?)\\s*('+WID.source+')?':'(\\d+(?:\\.\\d+)?)','i'));
    let size=null, width='';
    const sm=title.match(/(\d+(?:\.\d+)?)\s*(AAAA|AAA|AA|BB|A|B|C|DD|D|EEEE|EEE|EE|E|[2-6]E|M|N|W|EW)\b/i);
    if(sm){ size=parseFloat(sm[1]); width=sm[2].toUpperCase(); if(width==='EW')width='EE'; }
    else { const sn=title.match(/\b(\d{1,2}(?:\.\d)?)\b/); if(sn) size=parseFloat(sn[1]); }
    let material=(cells[iMaterial]||'').trim();
    if(!material){
      const mm=desc.match(/\b(ostrich|alligator|python|snakeskin|lizard|teju|elephant|sea turtle|caiman|eel|shark|calfskin|full quill|leather|suede|goat)\b/i);
      material=mm?mm[1]:'';
    }
    const notesRaw=(cells[iNotes]||'').trim();
    const price=extractGroupPrice(notesRaw);
    const photos=[];
    [cells[iMain], cells[iGal]].forEach(c=>{
      if(!c) return;
      (c.match(/https?:\/\/[^\s,;|]+/g)||[]).forEach(u=>{ if(!photos.includes(u)) photos.push(u); });
    });
    const wc=(gender==='M'&&size!=null)?womensFromMens(size,width):{ws:null,ww:null};
    const missing=[]; if(!photos.length)missing.push('photos'); if(!price||price<=0)missing.push('price');
    if(!brand||brand.toLowerCase()==='unknown')missing.push('brand'); if(size==null)missing.push('size'); if(!width)missing.push('width');
    const sku=(cells[iSKU]||'').trim();
    rows.push({sku,gender,brand,title,size,width,material,price,notes:desc,photos:photos.slice(0,30),
      women_size:wc.ws,women_width:wc.ww,suggest:[],missing,status:missing.length?'draft':'published'});
  }
  csvStaged=rows;
  adminView();
}

async function csvImport(){
  if(!csvStaged.length){ alert('No boots staged — choose a CSV file first.'); return; }
  await loadProducts();
  const bySku={}, byTitle={};
  products.forEach(p=>{ if(p.sku) bySku[p.sku]=p; if(p.title) byTitle[p.title.trim().toLowerCase()]=p; });
  const toInsert=[], toUpdate=[], matchedIds=new Set();
  csvStaged.forEach(r=>{
    const match=(r.sku&&bySku[r.sku])||byTitle[(r.title||'').trim().toLowerCase()];
    const noWidth=match?!!match.no_width:false;
    const missing=(r.missing||[]).filter(m=>!(m==='width'&&noWidth));
    const status=missing.length?'draft':'published';
    const rec={sku:r.sku||null,gender:r.gender,brand:r.brand,title:r.title,size:r.size,width:r.width,material:r.material,
      price:r.price,notes:r.notes,photos:r.photos,women_size:r.women_size,women_width:r.women_width,
      status,missing,suggest:r.suggest,no_width:noWidth};
    if(match){ toUpdate.push({id:match.id,rec,previous:{...match}}); matchedIds.add(match.id); } else { toInsert.push(rec); }
  });
  const missingNow=products.filter(p=>p.status==='published'&&!matchedIds.has(p.id));
  let errors=[];
  const logEntries=[];

  if(toInsert.length){
    const {data,error}=await sb.from('products').insert(toInsert).select('id');
    if(error) errors.push(error.message);
    else (data||[]).forEach(row=>logEntries.push({action:'insert',id:row.id}));
  }
  for(const u of toUpdate){
    const {error}=await sb.from('products').update(u.rec).eq('id',u.id);
    if(error){ errors.push(error.message); break; }
    logEntries.push({action:'update',id:u.id,previous:u.previous});
  }
  for(const p of missingNow){
    const {error}=await sb.from('products').update({status:'check'}).eq('id',p.id);
    if(error){ errors.push(error.message); break; }
    logEntries.push({action:'flag_check',id:p.id,previous:{status:p.status}});
  }
  if(errors.length){ alert('Import had errors: '+errors[0]); return; }

  const summary='Imported '+toInsert.length+' new, updated '+toUpdate.length+', flagged '+missingNow.length+' as possibly sold.';
  await sb.from('import_log').insert({summary,entries:logEntries});

  csvStaged=[]; adminTab='published';
  await loadProducts();
  alert('Imported '+toInsert.length+' new boot'+(toInsert.length===1?'':'s')+', updated '+toUpdate.length+' existing boot'+(toUpdate.length===1?'':'s')+
    (missingNow.length?', flagged '+missingNow.length+' boot'+(missingNow.length===1?'':'s')+' as possibly sold — check the "Sold?" tab.':'.')+
    ' You can undo this import from the CSV import tab if needed.');
  adminView();
}

async function undoLastImport(){
  if(!confirm('Undo the most recent CSV import? This reverses every change it made.')) return;
  const {data,error}=await sb.from('import_log').select('*').eq('undone',false).order('id',{ascending:false}).limit(1);
  if(error){ alert(error.message); return; }
  if(!data||!data.length){ alert('No import to undo.'); return; }
  const log=data[0];
  let errors=[];
  for(const e of log.entries){
    if(e.action==='insert'){
      const {error:delErr}=await sb.from('products').delete().eq('id',e.id);
      if(delErr) errors.push(delErr.message);
    } else if(e.action==='update'||e.action==='flag_check'){
      const p=e.previous;
      const restore={sku:p.sku,gender:p.gender,brand:p.brand,title:p.title,size:p.size,width:p.width,material:p.material,
        price:p.price,notes:p.notes,photos:p.photos,women_size:p.women_size,women_width:p.women_width,
        status:p.status,missing:p.missing,suggest:p.suggest};
      const {error:updErr}=await sb.from('products').update(restore).eq('id',e.id);
      if(updErr) errors.push(updErr.message);
    }
  }
  await sb.from('import_log').update({undone:true}).eq('id',log.id);
  if(errors.length){ alert('Undo finished with some errors: '+errors[0]); }
  else { alert('Import undone — inventory restored to how it was before that import.'); }
  await loadProducts();
  adminView();
}

  if(!adminQuery) return list;
  const q=adminQuery.toLowerCase();
  return list.filter(p=>(p.brand||'').toLowerCase().includes(q)||(p.material||'').toLowerCase().includes(q)||(p.title||'').toLowerCase().includes(q)||String(p.size||'').includes(q));
}

function addBody(){
  const p=editingId?products.find(x=>x.id===editingId):null;
  const preview=p?`<div style="display:flex;gap:14px;align-items:flex-start;margin:12px 0">${shot(p)}<div class="muted" style="text-transform:none;letter-spacing:0">${(p.photos||[]).length} photo${(p.photos||[]).length===1?'':'s'} on file. Main photo shown here — edit the list below to reorder or replace.</div></div>`:'';
  return `<h3 class="ctl-label" style="margin-top:18px">${editingId?'Edit item':'Add item manually'}</h3>
    <button class="btn" style="margin-bottom:14px" onclick="saveItem()">${editingId?'Save changes':'Save item'}</button>
    ${preview}
    <div class="formgrid">
      <label>Gender
        <select id="a_gender"><option value="M" ${(!p||p.gender==='M')?'selected':''}>Men's</option><option value="W" ${p&&p.gender==='W'?'selected':''}>Women's</option></select>
      </label>
      <label>Brand<input id="a_brand" value="${p?esc(p.brand||''):''}"></label>
      <label>Size + Width (e.g. 9.5D)<input id="a_size" value="${p&&p.size!=null?p.size+(p.width||''):''}"></label>
      <label style="display:flex;align-items:center;gap:6px;margin-top:22px"><input type="checkbox" id="a_nowidth" ${p&&p.no_width?'checked':''}> No width available</label>
      <label>Women's equivalent size (optional override)<input id="a_wsize" type="number" step="0.5" value="${p&&p.women_size?p.women_size:''}"></label>
      <label>Leather / material<input id="a_leather" value="${p?esc(p.material||''):''}"></label>
      ${(p&&p.wholesale&&p.price==null)?'':`<label>Price (USD)<input id="a_price" type="number" step="0.01" value="${p&&p.price?p.price:''}"></label>`}
      <label>Wholesale Price (USD)<input id="a_wsprice" type="number" step="0.01" placeholder="leave blank = not wholesale" value="${p&&p.wholesale_price!=null?p.wholesale_price:''}"></label>
      <label class="full">Title<input id="a_title" value="${p?esc(p.title||''):''}"></label>
      <label class="full">Notes / condition report<textarea id="a_notes" rows="3">${p?esc(p.notes||''):''}</textarea></label>
      <label class="full">Photo URLs (one per line, first is the cover photo)<textarea id="a_photos" rows="3">${p?(p.photos||[]).join('\n'):''}</textarea></label>
    </div>
    <button class="btn" onclick="saveItem()">${editingId?'Save changes':'Save item'}</button>`;
}

function csvBody(){
  const staged=csvStaged;
  return `<h3 class="ctl-label" style="margin-top:18px">Import from ListPerfectly CSV</h3>
    <p class="muted" style="text-transform:none;letter-spacing:0">Choose your exported CSV file. Boots with all required fields publish immediately; anything missing goes to Needs Review. Re-importing updates existing boots by SKU/title instead of duplicating them.</p>
    <input type="file" accept=".csv" onchange="csvFileChosen(this)">
    ${staged.length?`<div class="banner">${staged.length} boots ready — ${staged.filter(r=>r.status==='published').length} will publish, ${staged.filter(r=>r.status==='draft').length} need review.</div>
      <button class="btn" onclick="csvImport()">Import ${staged.length} boots</button>`:''}
    <div style="margin-top:22px;padding-top:16px;border-top:1px solid var(--line)">
      <button class="btn ghost sm" onclick="undoLastImport()">Undo last import</button>
      <p class="muted" style="text-transform:none;letter-spacing:0;margin-top:6px">Reverses the most recent CSV import — restores updated boots, removes newly-inserted ones, and un-flags anything marked possibly sold by that import.</p>
    </div>`;
}

function adminView(){
  setMeta("Admin | Dan's Boot Sale","",null);
  if(!isAdmin){
    V().innerHTML=`<h2 class="sec">Admin login</h2>
      <div class="formgrid" style="max-width:380px">
        <label class="full">Email<input id="adm_email" type="email"></label>
        <label class="full">Password<input id="adm_pw" type="password"></label>
        <div class="full muted" style="text-transform:none;letter-spacing:0;font-size:11px;margin-top:-6px">bowtie2024</div>
        <div class="full"><button class="btn" onclick="adminLogin()">Log in</button></div>
      </div>
      <p class="muted" style="text-transform:none;letter-spacing:0">Use the email &amp; password you created in Supabase → Authentication → Users.</p>`;
    return;
  }
  const cnt=st=>products.filter(p=>p.status===st).length;
  const cntWS=st=>products.filter(p=>p.status===st&&p.wholesale).length;
  const cntWSOrders=dbOrders.filter(o=>o.channel==='wholesale').length;
  const tabs=`<div class="group" style="margin:14px 0 8px;flex-wrap:wrap">
    <button class="seg ${adminTab==='drafts'?'active':''}" onclick="setAdminTab('drafts')">Needs Review (${cnt('draft')})</button>
    <button class="seg ${adminTab==='published'?'active':''}" onclick="setAdminTab('published')">Published (${cnt('published')})</button>
    <button class="seg ${adminTab==='add'?'active':''}" onclick="setAdminTab('add')">Add item</button>
    <button class="seg ${adminTab==='csv'?'active':''}" onclick="setAdminTab('csv')">CSV import</button>
    <button class="seg ${adminTab==='orders'?'active':''}" onclick="setAdminTab('orders')">Orders</button>
    <button class="seg ${adminTab==='archived'?'active':''}" onclick="setAdminTab('archived')">Archived (${cnt('archived')})</button>
    <button class="seg ${adminTab==='soldcheck'?'active':''}" onclick="setAdminTab('soldcheck')">Sold? (${cnt('check')})</button>
  </div>
  <div class="group" style="margin:0 0 18px;flex-wrap:wrap;padding-top:10px;border-top:1px solid var(--line)">
    <button class="seg ${adminTab==='wsDrafts'?'active':''}" onclick="setAdminTab('wsDrafts')">Needs Review Wholesale (${cntWS('draft')})</button>
    <button class="seg ${adminTab==='wsPublished'?'active':''}" onclick="setAdminTab('wsPublished')">Wholesale Published (${cntWS('published')})</button>
    <button class="seg ${adminTab==='wsOrders'?'active':''}" onclick="setAdminTab('wsOrders')">Wholesale Orders (${cntWSOrders})</button>
  </div>`;
  let body='';
  if(adminTab==='drafts'){
    const list=filterByQuery(products.filter(p=>p.status==='draft'));
    const clearBtn=list.length?`<button class="btn ghost sm" onclick="deleteAllDrafts()" style="margin-bottom:12px">Delete all Needs Review (${products.filter(p=>p.status==='draft').length})</button>`:'';
    body=clearBtn+(list.length?list.map(draftRow).join(''):'<p class="muted">No drafts — everything is clean.</p>');
  } else if(adminTab==='wsDrafts'){
    const list=filterByQuery(products.filter(p=>p.status==='draft'&&p.wholesale));
    const clearBtn=list.length?`<button class="btn ghost sm" onclick="deleteAllDraftsWS()" style="margin-bottom:12px">Delete all Needs Review Wholesale (${products.filter(p=>p.status==='draft'&&p.wholesale).length})</button>`:'';
    body=clearBtn+(list.length?list.map(draftRow).join(''):'<p class="muted">No wholesale drafts — everything is clean.</p>');
  } else if(adminTab==='published'){
    const list=filterByQuery(products.filter(p=>p.status==='published'));
    body=list.length?list.map(publishedRow).join(''):'<p class="muted">Nothing published yet.</p>';
  } else if(adminTab==='wsPublished'){
    const list=filterByQuery(products.filter(p=>p.status==='published'&&p.wholesale));
    body=list.length?list.map(p=>publishedRow(p,true)).join(''):'<p class="muted">Nothing published to wholesale yet.</p>';
  } else if(adminTab==='archived'){
    const list=filterByQuery(products.filter(p=>p.status==='archived'));
    body=list.length?list.map(archivedRow).join(''):'<p class="muted">No archived items.</p>';
  } else if(adminTab==='soldcheck'){
    const list=filterByQuery(products.filter(p=>p.status==='check'));
    const clearBtn=list.length?`<button class="btn ghost sm" onclick="deleteAllSoldCheck()" style="margin-bottom:12px">Delete all Sold? items (${products.filter(p=>p.status==='check').length})</button>`:'';
    body=clearBtn+(list.length?list.map(soldCheckRow).join(''):'<p class="muted">Nothing flagged — every published boot matched your last CSV import.</p>');
  } else if(adminTab==='add'){
    body=addBody();
  } else if(adminTab==='csv'){
    body=csvBody();
  } else if(adminTab==='orders'){
    body=ordersBody(dbOrders.filter(o=>o.channel!=='wholesale'));
  } else if(adminTab==='wsOrders'){
    body=ordersBody(dbOrders.filter(o=>o.channel==='wholesale'),'No wholesale purchase requests yet.');
  }
  const sbBox=(adminTab==='drafts'||adminTab==='wsDrafts'||adminTab==='published'||adminTab==='wsPublished'||adminTab==='archived'||adminTab==='soldcheck')
    ?`<input id="admsearch" class="admsearch" type="search" placeholder="Search — brand, leather, size…" value="${esc(adminQuery)}" oninput="setAdminQuery(this.value)">`:'';
  V().innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center">
      <h2 class="sec">Admin</h2><button class="link" onclick="adminLogout()">Log out</button>
    </div>
    ${tabs}${sbBox}${body}`;
}
async function adminLogin(){ const email=(document.getElementById('adm_email')||{}).value?.trim()||''; const pw=(document.getElementById('adm_pw')||{}).value||'';
  const {error}=await sb.auth.signInWithPassword({email,password:pw}); if(error){alert(error.message);return;} isAdmin=true; await loadProducts(); adminView(); }
async function adminLogout(){ await sb.auth.signOut(); isAdmin=false; await loadProducts(); go('catalog'); }
function openDbReceipt(id){ const d=dbOrders.find(x=>x.id===id); if(!d)return;
  orders.push({id:d.id,first:d.first_name,last:d.last_name,street:d.street,apt:d.apt,city:d.city,state:d.state,zip:d.zip,country:d.country,
    contactMethod:d.contact_method,contactValue:d.contact_value,payment:d.payment,carriers:d.carriers||[],insurance:Number(d.insurance||0),
    subtotal:Number(d.subtotal||0),total:Number(d.total||0),items:(d.items||[])}); go('receipt',id); }
async function delOrder(id){
  const o=dbOrders.find(x=>x.id===id);
  const label=o?`REQ ${String(o.id).padStart(4,'0')} — ${o.first_name||''} ${o.last_name||''}`:('order '+id);
  if(!confirm('Delete '+label+'? This permanently removes the order request and cannot be undone. (The boots stay in your inventory.)')) return;
  const {error}=await sb.from('orders').delete().eq('id',id);
  if(error){ alert('Could not delete: '+error.message); return; }
  await loadOrders(); adminView();
}

(async()=>{ try{const {data}=await sb.auth.getSession(); isAdmin=!!(data&&data.session);}catch(e){} try{await loadProducts();}catch(e){console.warn("DB unavailable",e);} go('catalog'); badge(); })();
</script>
</body>
</html>
